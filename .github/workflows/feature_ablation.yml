# Feature Foundry CI gate.
#
# Backup for the local pre-commit hook (`.pre-commit-config.yaml`).
# Both invoke `scripts/feature_foundry_gate.py`. Pre-commit is primary
# because it gives feedback in <10s; this workflow is the unskippable
# guard against `git commit --no-verify` and against contributors who
# haven't run `pre-commit install`.
#
# What it does on every PR / push touching feature files:
#   1. Runs `tests/test_feature_foundry.py` (the substrate suite).
#   2. Validates the model card for each changed feature.
#   3. Generates the deterministic adversarial twin and rejects the PR
#      if the twin captures more than ~77% of the real feature's lift
#      (configurable via FOUNDRY_ADVERSARIAL_MARGIN env var; default
#      0.30 ⇒ 77% twin-capture cap).
#
# The advisory leakage detector at `core/observability/leakage_detector.py`
# already runs at @feature decorator time. It surfaces lookahead patterns
# in source code — a complementary, static-analysis layer. This workflow
# is the statistical falsification layer; the two do not duplicate logic.

name: Feature Foundry gate

on:
  pull_request:
    paths:
      - "core/feature_foundry/**"
      - "tests/test_feature_foundry.py"
      - "scripts/feature_foundry_gate.py"
      - ".github/workflows/feature_ablation.yml"
  push:
    branches: [main]
    paths:
      - "core/feature_foundry/**"
      - "tests/test_feature_foundry.py"
      - "scripts/feature_foundry_gate.py"

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history for diff base)
        uses: actions/checkout@v4
        with:
          # We need at least the merge base for `git diff` to work.
          fetch-depth: 0

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-py3.14-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-py3.14-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # The gate only needs the Foundry's own runtime deps + pytest.
          # We install the full requirements.txt because the existing
          # tests touch dash, dash_table, pandas, etc.
          pip install -r requirements.txt
          pip install pytest pyyaml

      - name: Resolve diff base
        id: diff
        run: |
          # On PRs, diff against the PR base. On push, diff against the
          # previous commit. The gate falls back gracefully if the base
          # ref is missing.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Feature Foundry gate
        env:
          # Centralised threshold; override here without code changes if
          # a future round needs to tighten/loosen the adversarial bar.
          FOUNDRY_ADVERSARIAL_MARGIN: "0.30"
        run: |
          python -m scripts.feature_foundry_gate \
            --diff-base "${{ steps.diff.outputs.base }}"

      - name: Run gate against ALL features (sanity sweep on main)
        # On push to main, additionally gate every existing feature so
        # we catch silent regressions in the substrate (e.g. a
        # data-source change that breaks coverage on a feature whose
        # own file wasn't touched).
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FOUNDRY_ADVERSARIAL_MARGIN: "0.30"
        run: |
          python -m scripts.feature_foundry_gate --all --skip-pytest
